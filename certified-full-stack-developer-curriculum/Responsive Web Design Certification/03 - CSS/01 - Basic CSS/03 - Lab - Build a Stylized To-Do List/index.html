<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css"
</head>

<body>
    <h1>My To-Do List</h1>
    <ul class="todo-list">
        <li>
            <input id="mice" type="checkbox"><label for="mice">Explore Gaming Mice</label>
            <ul class="sub-item"><li><a href="https://www.scan.co.uk/shop/gaming-and-sims/mice/all" target="_blank" class="sub-item-link">Store link</a></li></ul>
        </li>

        <li>
            <input id="ram" type="checkbox"><label for="ram">Install more RAM :)</label>
            <ul class="sub-item"><li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="sub-item-link">Video Guide</a></li></ul>
        </li>

        <li>
            <input id="hdd" type="checkbox"><label for="hdd">Buy a new Hard Drive</label>
            <ul class="sub-item"><li><a href="https://www.westerndigital.com/en-gb/products/internal-drives/wd-red-pro-sata-hdd?sku=WD2002FFSX" target="_blank" class="sub-item-link">View Model Number</a></li></ul>
        </li>

        <li>
            <input id="ups" type="checkbox"><label for="ups">Research Uninterruptible Power Supply (UPS)</label>
            <ul class="sub-item"><li><a href="https://en.wikipedia.org/wiki/Uninterruptible_power_supply" target="_blank" class="sub-item-link">Wikipedia Page</a></li></ul>
        </li>
    </ul>
</body>

</html>
